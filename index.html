<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tebak Lagu</title>
<meta name="description" content="Tebak Lagu - game tebak judul lagu dari cuplikan audio">
<style>
  :root{
    --bg:#0B0B10;
    --surface:#17151F;
    --surface-2:#1F1C2B;
    --border:#2A2735;
    --gold:#D8A54B;
    --gold-soft:#E8C685;
    --violet:#8C7CFF;
    --violet-soft:#A99CFF;
    --text:#F4F1EA;
    --text-muted:#9B96A8;
    --focus:#E8C685;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    min-height:100%;
  }

  body{
    display:flex;
    flex-direction:column;
    min-height:100vh;
    min-height:100dvh;
  }

  /* Latar dekoratif, disembunyikan total dari teknologi bantu */
  .bg-decor{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
    pointer-events:none;
  }
  .bg-decor .glow{
    position:absolute;
    border-radius:50%;
    filter:blur(70px);
    opacity:.35;
  }
  .bg-decor .glow-gold{
    width:280px;height:280px;
    background:var(--gold);
    top:-80px; right:-60px;
  }
  .bg-decor .glow-violet{
    width:320px;height:320px;
    background:var(--violet);
    bottom:-100px; left:-80px;
  }

  main.menu{
    position:relative;
    z-index:1;
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:32px;
    padding:32px 20px 40px;
    max-width:420px;
    margin:0 auto;
    width:100%;
    text-align:center;
  }

  /* Piringan hitam berputar - murni dekoratif */
  .vinyl{
    width:120px;
    height:120px;
    border-radius:50%;
    background:
      radial-gradient(circle at center, var(--bg) 0 14px, transparent 15px),
      conic-gradient(from 0deg,
        var(--surface-2) 0deg,
        #100E17 25deg,
        var(--surface-2) 50deg,
        #100E17 75deg,
        var(--surface-2) 100deg,
        #100E17 125deg,
        var(--surface-2) 150deg,
        #100E17 175deg,
        var(--surface-2) 200deg,
        #100E17 225deg,
        var(--surface-2) 250deg,
        #100E17 275deg,
        var(--surface-2) 300deg,
        #100E17 325deg,
        var(--surface-2) 350deg,
        #100E17 360deg);
    border:3px solid var(--border);
    box-shadow:0 0 0 6px rgba(216,165,75,.08), 0 20px 40px -20px rgba(0,0,0,.7);
    position:relative;
    animation:spin 14s linear infinite;
  }
  .vinyl::after{
    content:"";
    position:absolute;
    inset:0;
    margin:auto;
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--gold);
  }
  @keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
  }
  @media (prefers-reduced-motion:reduce){
    .vinyl{animation:none;}
  }

  .brand{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
  }

  h1{
    margin:0;
    font-size:2.1rem;
    font-weight:800;
    letter-spacing:-0.02em;
    color:var(--gold-soft);
  }

  .tagline{
    margin:0;
    font-size:.95rem;
    color:var(--text-muted);
    max-width:280px;
    line-height:1.5;
  }

  /* Badge Cordkoin */
  .coin-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--surface);
    border:1px solid var(--border);
    padding:10px 18px;
    border-radius:999px;
    font-weight:600;
    font-size:1rem;
    box-shadow:0 8px 20px -12px rgba(0,0,0,.6);
  }
  .coin-icon{
    font-size:1.05rem;
    line-height:1;
  }
  .coin-value{
    color:var(--gold-soft);
    font-variant-numeric:tabular-nums;
  }
  .coin-unit{
    color:var(--text-muted);
    font-weight:500;
  }

  /* Badge piala turnamen */
  .trophy-badge{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    max-width:280px;
    background:var(--surface);
    border:1px solid var(--border);
    padding:12px 16px;
    border-radius:16px;
    font-family:inherit;
    color:var(--text);
    cursor:pointer;
    text-align:left;
    box-shadow:0 8px 20px -12px rgba(0,0,0,.6);
    transition:transform .15s ease, filter .15s ease;
  }
  .trophy-badge:active{
    transform:scale(0.97);
  }
  .trophy-badge:focus-visible{
    outline:3px solid var(--focus);
    outline-offset:3px;
  }
  .trophy-badge:hover{
    filter:brightness(1.1);
  }
  .trophy-icon{
    flex-shrink:0;
    font-size:1.7rem;
    line-height:1;
  }
  .trophy-info{
    display:flex;
    flex-direction:column;
    gap:5px;
    min-width:0;
    flex:1;
  }
  .trophy-name{
    font-size:.92rem;
    font-weight:700;
    color:var(--gold-soft);
  }
  .trophy-progress-row{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .trophy-progress-track{
    flex:1;
    height:6px;
    border-radius:999px;
    background:var(--surface-2);
    overflow:hidden;
  }
  .trophy-progress-fill{
    display:block;
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg, var(--gold), var(--gold-soft));
  }
  .trophy-progress-text{
    font-size:.72rem;
    color:var(--text-muted);
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
  }

  /* Modal daftar tingkatan piala */
  .trophy-overlay{
    position:fixed;
    inset:0;
    z-index:10;
    background:rgba(6,5,10,.72);
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }
  .trophy-overlay[hidden]{
    display:none;
  }
  .trophy-modal{
    width:100%;
    max-width:420px;
    max-height:80vh;
    overflow-y:auto;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:24px 24px 0 0;
    padding:20px 20px calc(20px + env(safe-area-inset-bottom));
    -webkit-overflow-scrolling:touch;
  }
  .trophy-modal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:16px;
  }
  .trophy-modal-title{
    margin:0;
    font-size:1.1rem;
    font-weight:800;
    color:var(--gold-soft);
  }
  .btn-close{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:36px;
    height:36px;
    border-radius:12px;
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--text);
    cursor:pointer;
    flex-shrink:0;
  }
  .btn-close:active{
    transform:scale(0.94);
  }
  .btn-close:focus-visible{
    outline:3px solid var(--focus);
    outline-offset:3px;
  }
  .btn-close svg{
    width:18px;
    height:18px;
  }
  .trophy-tier-list{
    display:flex;
    flex-direction:column;
    gap:10px;
    list-style:none;
    margin:0;
    padding:0;
  }
  .trophy-tier-item{
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid var(--border);
    background:var(--surface-2);
  }
  .trophy-tier-item.is-current{
    border-color:var(--gold-soft);
    background:rgba(216,165,75,.12);
  }
  .trophy-tier-item.is-locked{
    opacity:.5;
  }
  .trophy-tier-icon{
    font-size:1.4rem;
    flex-shrink:0;
    width:32px;
    text-align:center;
  }
  .trophy-tier-body{
    display:flex;
    flex-direction:column;
    gap:2px;
    min-width:0;
  }
  .trophy-tier-name{
    font-size:.92rem;
    font-weight:700;
    color:var(--text);
  }
  .trophy-tier-target{
    font-size:.76rem;
    color:var(--text-muted);
  }

  .menu-actions{
    display:flex;
    flex-direction:column;
    gap:14px;
    width:100%;
    max-width:280px;
  }

  .btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:16px 20px;
    border-radius:16px;
    border:1px solid transparent;
    font-size:1.05rem;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
    transition:transform .15s ease, filter .15s ease;
  }
  .btn[hidden]{
    display:none;
  }
  .btn:active{
    transform:scale(0.97);
  }
  .btn:focus-visible{
    outline:3px solid var(--focus);
    outline-offset:3px;
  }

  .btn-primary{
    background:linear-gradient(135deg, var(--violet), #6E5FE0);
    color:#fff;
  }
  .btn-primary:hover{
    filter:brightness(1.08);
  }

  .btn-secondary{
    background:var(--surface);
    border-color:var(--border);
    color:var(--text);
  }
  .btn-secondary:hover{
    filter:brightness(1.15);
  }

  .btn svg{
    width:20px;
    height:20px;
    flex-shrink:0;
  }

  /* Pembungkus konten layar (menu/mode/game). Dipakai sebagai satu blok
     agar mudah disembunyikan total dari pembaca layar (inert + aria-hidden)
     setiap kali ada popup terbuka di atasnya. */
  #appContent{
    display:flex;
    flex-direction:column;
    flex:1;
    min-height:0;
    width:100%;
  }

  .version{
    margin-top:auto;
    padding:14px 0 8px;
    font-size:.75rem;
    color:var(--text-muted);
    opacity:.6;
    text-align:center;
  }

  /* ===== Layar pilihan mode ===== */
  main.menu[hidden]{
    display:none;
  }

  .screen-mode{
    justify-content:flex-start;
    gap:20px;
    padding-top:24px;
  }

  .mode-header{
    display:flex;
    align-items:center;
    width:100%;
    position:relative;
    min-height:40px;
  }

  .btn-back{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:40px;
    height:40px;
    border-radius:12px;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);
    cursor:pointer;
    flex-shrink:0;
  }
  .btn-back:active{
    transform:scale(0.94);
  }
  .btn-back:focus-visible{
    outline:3px solid var(--focus);
    outline-offset:3px;
  }
  .btn-back svg{
    width:20px;
    height:20px;
  }

  .mode-title-wrap{
    flex:1;
    text-align:center;
    padding-right:40px;
  }

  h2.mode-heading{
    margin:0;
    font-size:1.3rem;
    font-weight:800;
    color:var(--gold-soft);
  }

  .mode-list{
    display:flex;
    flex-direction:column;
    gap:16px;
    width:100%;
    max-width:320px;
  }

  .mode-card{
    display:flex;
    align-items:center;
    gap:16px;
    width:100%;
    padding:18px;
    border-radius:18px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text);
    font-family:inherit;
    text-align:left;
    cursor:pointer;
    transition:transform .15s ease, filter .15s ease, border-color .15s ease;
  }
  .mode-card:active{
    transform:scale(0.97);
  }
  .mode-card:focus-visible{
    outline:3px solid var(--focus);
    outline-offset:3px;
  }
  .mode-card:hover{
    filter:brightness(1.1);
  }

  .mode-card-classic{
    border-color:rgba(140,124,255,.4);
  }
  .mode-card-classic:hover{
    border-color:var(--violet-soft);
  }

  .mode-card-tournament{
    border-color:rgba(216,165,75,.4);
  }
  .mode-card-tournament:hover{
    border-color:var(--gold-soft);
  }

  .mode-icon{
    flex-shrink:0;
    width:48px;
    height:48px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.5rem;
  }
  .mode-card-classic .mode-icon{
    background:rgba(140,124,255,.16);
  }
  .mode-card-tournament .mode-icon{
    background:rgba(216,165,75,.16);
  }

  .mode-info{
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:0;
  }
  .mode-name{
    font-size:1.05rem;
    font-weight:700;
  }
  .mode-card-classic .mode-name{
    color:var(--violet-soft);
  }
  .mode-card-tournament .mode-name{
    color:var(--gold-soft);
  }
  .mode-desc{
    font-size:.85rem;
    color:var(--text-muted);
    line-height:1.4;
    margin:0;
  }

  /* ===== Layar permainan Turnamen ===== */
  .game-progress{
    margin:0;
    font-size:.85rem;
    color:var(--text-muted);
    text-align:center;
  }

  .clue-card{
    width:100%;
    max-width:340px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:18px;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:8px;
    box-shadow:0 8px 20px -12px rgba(0,0,0,.6);
  }
  .clue-card:focus-visible{
    outline:3px solid var(--focus);
    outline-offset:3px;
  }
  .clue-label{
    font-size:.75rem;
    font-weight:700;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:var(--gold-soft);
  }
  .clue-text{
    margin:0;
    font-size:1.05rem;
    line-height:1.5;
    color:var(--text);
  }

  .answer-list{
    display:flex;
    flex-direction:column;
    gap:14px;
    width:100%;
    max-width:340px;
  }
  .answer-btn{
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);
    min-height:52px;
    text-align:center;
  }
  .answer-btn:hover{
    filter:brightness(1.12);
  }
  .answer-btn.is-correct{
    border-color:#5FCB85;
    background:rgba(95,203,133,.16);
    color:#B8F0CB;
  }
  .answer-btn.is-wrong{
    border-color:#E06767;
    background:rgba(224,103,103,.16);
    color:#F5B8B8;
  }
  .answer-btn[disabled]{
    cursor:default;
    opacity:.85;
  }

  .game-empty{
    width:100%;
    max-width:320px;
    text-align:center;
  }
  .game-empty:focus-visible{
    outline:3px solid var(--focus);
    outline-offset:3px;
  }

  /* Overlay hasil jawaban & ringkasan ronde, gaya senada dengan trophy-overlay */
  .game-overlay{
    position:fixed;
    inset:0;
    z-index:20;
    background:rgba(6,5,10,.72);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .game-overlay[hidden]{
    display:none;
  }
  .game-modal{
    width:100%;
    max-width:340px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:24px 22px;
    text-align:center;
    box-shadow:0 20px 50px -20px rgba(0,0,0,.8);
  }
  .game-modal-title{
    margin:0 0 10px;
    font-size:1.2rem;
    font-weight:800;
    color:var(--gold-soft);
  }
  .game-modal-desc{
    margin:0 0 20px;
    font-size:.95rem;
    line-height:1.5;
    color:var(--text-muted);
  }
  .game-modal-actions{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
</style>
</head>
<body>

  <script>
    // Modul penyimpanan data permainan di IndexedDB. IndexedDB menjadi sumber
    // data utama yang persisten, sementara localStorage tetap dipakai sebagai
    // cache baca cepat (sinkron) agar TalkBack/VoiceOver bisa langsung
    // membaca nilai final saat elemen dirender, tanpa jeda async IndexedDB.
    (function(){
      var DB_NAME = 'TebakLaguDB';
      var DB_VERSION = 1;
      var STORE_NAME = 'gameData';
      var dbPromise = null;

      function openDB(){
        if (dbPromise) return dbPromise;
        dbPromise = new Promise(function(resolve, reject){
          if (!window.indexedDB){
            reject(new Error('IndexedDB tidak didukung'));
            return;
          }
          var req = window.indexedDB.open(DB_NAME, DB_VERSION);
          req.onupgradeneeded = function(e){
            var db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)){
              db.createObjectStore(STORE_NAME, { keyPath: 'key' });
            }
          };
          req.onsuccess = function(e){ resolve(e.target.result); };
          req.onerror = function(e){ reject(e.target.error); };
        });
        return dbPromise;
      }

      // Menyimpan satu pasangan key-value ke IndexedDB (sumber data utama).
      function setItem(key, value){
        return openDB().then(function(db){
          return new Promise(function(resolve, reject){
            var tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).put({ key: key, value: value });
            tx.oncomplete = function(){ resolve(); };
            tx.onerror = function(e){ reject(e.target.error); };
          });
        })['catch'](function(){
          // IndexedDB gagal menyimpan, data tetap tersedia di cache localStorage
        });
      }

      // Membaca satu nilai dari IndexedDB.
      function getItem(key){
        return openDB().then(function(db){
          return new Promise(function(resolve, reject){
            var tx = db.transaction(STORE_NAME, 'readonly');
            var req = tx.objectStore(STORE_NAME).get(key);
            req.onsuccess = function(){ resolve(req.result ? req.result.value : undefined); };
            req.onerror = function(e){ reject(e.target.error); };
          });
        });
      }

      // Membaca seluruh data permainan sekaligus dari IndexedDB.
      function getAll(){
        return openDB().then(function(db){
          return new Promise(function(resolve, reject){
            var tx = db.transaction(STORE_NAME, 'readonly');
            var req = tx.objectStore(STORE_NAME).getAll();
            req.onsuccess = function(){
              var map = {};
              (req.result || []).forEach(function(row){ map[row.key] = row.value; });
              resolve(map);
            };
            req.onerror = function(e){ reject(e.target.error); };
          });
        });
      }

      window.TebakLaguDB = { setItem: setItem, getItem: getItem, getAll: getAll };

      // Menulis satu nilai ke cache localStorage (sinkron) sekaligus ke
      // IndexedDB (persisten). Dipakai oleh semua fungsi penyimpanan data
      // permainan (koin, status piala, dsb) agar keduanya selalu selaras.
      function saveGameValue(key, value){
        try{ window.localStorage.setItem(key, value); }catch(e){
          // localStorage tidak tersedia, lanjut simpan ke IndexedDB saja
        }
        window.TebakLaguDB.setItem(key, value);
      }
      window.tebakLaguSaveValue = saveGameValue;

      // Kunci data permainan yang dipindahkan ke IndexedDB.
      var GAME_DATA_KEYS = ['tebakLagu_coins', 'tebakLagu_trophyTier', 'tebakLagu_trophyStars'];

      // Menyamakan cache localStorage dengan IndexedDB saat aplikasi dibuka.
      // Jika IndexedDB masih kosong (pengguna lama / pembaruan pertama kali),
      // data localStorage yang ada dipindahkan ke IndexedDB sebagai migrasi
      // satu kali. Jika IndexedDB sudah berisi data, itulah sumber utama dan
      // localStorage disamakan dengannya.
      function syncGameStorage(){
        window.TebakLaguDB.getAll().then(function(dbData){
          var hasDbData = Object.keys(dbData).length > 0;
          if (!hasDbData){
            GAME_DATA_KEYS.forEach(function(key){
              try{
                var legacyValue = window.localStorage.getItem(key);
                if (legacyValue !== null) window.TebakLaguDB.setItem(key, legacyValue);
              }catch(e){
                // localStorage tidak tersedia, tidak ada yang perlu dimigrasi
              }
            });
          } else {
            GAME_DATA_KEYS.forEach(function(key){
              if (Object.prototype.hasOwnProperty.call(dbData, key)){
                try{ window.localStorage.setItem(key, dbData[key]); }catch(e){}
              }
            });
          }
        })['catch'](function(){
          // IndexedDB tidak tersedia di perangkat ini, aplikasi tetap berjalan
          // menggunakan localStorage saja sebagai penyimpanan cadangan.
        });
      }
      syncGameStorage();
    })();
  </script>

  <div class="bg-decor" aria-hidden="true">
    <div class="glow glow-gold"></div>
    <div class="glow glow-violet"></div>
  </div>

  <div id="appContent">

  <main class="menu" id="screenMenu">

    <div class="brand">
      <div class="vinyl" aria-hidden="true"></div>
      <h1 role="text" aria-label="Tebak Lagu">Tebak Lagu</h1>
      <p class="tagline" role="text" aria-label="Dengarkan cuplikannya, tebak judul lagunya secepat mungkin.">Dengarkan cuplikannya, tebak judul lagunya secepat mungkin.</p>
    </div>

    <div class="coin-badge" id="coinBadge" role="status" aria-label="0 Cordkoin">

    <script>
      // Render badge piala secara sinkron sebelum DOMContentLoaded agar TalkBack
      // membaca status piala langsung, tanpa jeda atau nilai default sementara.
      (function(){
        var TROPHY_TIERS = [
          { name:'Piala Perunggu', icon:'🥉', target:10 },
          { name:'Piala Perak', icon:'🥈', target:15 },
          { name:'Piala Emas', icon:'🥇', target:25 },
          { name:'Piala Diamond', icon:'💎', target:27 },
          { name:'Piala Elite', icon:'🌟', target:35 },
          { name:'Piala Master', icon:'🎖️', target:50 },
          { name:'Piala Grandmaster', icon:'👑', target:100 },
          { name:'Piala Legend', icon:'🏆', target:150 }
        ];
        window.TEBAK_LAGU_TROPHY_TIERS = TROPHY_TIERS;

        // Membaca status piala (tingkat & bintang) dari localStorage.
        function loadTrophyState(){
          var tier = 0, stars = 0;
          try{
            var savedTier = window.localStorage.getItem('tebakLagu_trophyTier');
            var savedStars = window.localStorage.getItem('tebakLagu_trophyStars');
            if (savedTier !== null){
              tier = parseInt(savedTier, 10);
              if (isNaN(tier) || tier < 0) tier = 0;
              if (tier > TROPHY_TIERS.length - 1) tier = TROPHY_TIERS.length - 1;
            }
            if (savedStars !== null){
              stars = parseInt(savedStars, 10);
              if (isNaN(stars) || stars < 0) stars = 0;
            }
          }catch(e){
            // localStorage tidak tersedia, biarkan nilai default tingkat 1, 0 bintang
          }
          return { tier: tier, stars: stars };
        }
        window.tebakLaguLoadTrophyState = loadTrophyState;

        // Memperbarui tampilan badge piala di menu sesuai status saat ini.
        function renderTrophyBadge(state){
          var tierInfo = TROPHY_TIERS[state.tier];
          var isMaxTier = state.tier === TROPHY_TIERS.length - 1;
          var icon = document.getElementById('trophyIcon');
          var name = document.getElementById('trophyName');
          var fill = document.getElementById('trophyProgressFill');
          var text = document.getElementById('trophyProgressText');
          var badge = document.getElementById('trophyBadge');
          if (!icon || !name || !fill || !text || !badge) return;

          icon.textContent = tierInfo.icon;
          name.textContent = tierInfo.name;

          var displayStars = isMaxTier ? state.stars : Math.min(state.stars, tierInfo.target);
          var percent = isMaxTier ? 100 : Math.min(100, (displayStars / tierInfo.target) * 100);
          fill.style.width = percent + '%';

          var progressLabel;
          if (isMaxTier){
            progressLabel = displayStars + (displayStars >= tierInfo.target ? '+' : '') + ' ★';
          } else {
            progressLabel = displayStars + '/' + tierInfo.target + ' ★';
          }
          text.textContent = progressLabel;

          var ariaDesc = isMaxTier
            ? (tierInfo.name + '. ' + displayStars + ' bintang. Tingkat piala tertinggi. Ketuk untuk melihat semua tingkatan piala.')
            : (tierInfo.name + '. ' + displayStars + ' dari ' + tierInfo.target + ' bintang. Ketuk untuk melihat semua tingkatan piala.');
          badge.setAttribute('aria-label', ariaDesc);
        }
        window.tebakLaguRenderTrophyBadge = renderTrophyBadge;

        renderTrophyBadge(loadTrophyState());
      })();
    </script>

  <script>

      var answerResultDesc = document.getElementById('answerResultDesc');

      var summaryTitle = document.getElementById('summaryTitle');
      var summaryDesc = document.getElementById('summaryDesc');
      var btnSummaryAgain = document.getElementById('btnSummaryAgain');
      var btnSummaryDone = document.getElementById('btnSummaryDone');

      var trophyBadge = document.getElementById('trophyBadge');
      var trophyOverlay = document.getElementById('trophyOverlay');
      var trophyModalTitle = document.getElementById('trophyModalTitle');
      var btnTrophyClose = document.getElementById('btnTrophyClose');
      var trophyTierList = document.getElementById('trophyTierList');
      var TROPHY_TIERS = window.TEBAK_LAGU_TROPHY_TIERS;

      // Menetapkan teks tampilan sekaligus teks yang diucapkan pembaca layar.
      // role="text" + aria-label memaksa TalkBack/VoiceOver memperlakukan
      // elemen sebagai satu blok teks polos: warna, ukuran, jenis font, atau
      // emoji dekoratif tidak akan diumumkan — hanya isi "spokenText".
      // Jika spokenText tidak diberikan, teks tampilan (displayText) dipakai
      // apa adanya sebagai teks yang diucapkan.
      function setAccessibleText(el, displayText, spokenText){
        el.textContent = displayText;
        el.setAttribute('role', 'text');
        el.setAttribute('aria-label', spokenText !== undefined && spokenText !== null ? spokenText : displayText);
      }

      // Mengunci/melepas seluruh konten layar (menu, mode, game) dari
      // jangkauan pembaca layar setiap kali sebuah popup (konfirmasi
      // jawaban, ringkasan ronde, atau daftar tingkatan piala) terbuka.
      // Tanpa ini, gestur geser TalkBack/VoiceOver bisa "menembus" popup dan
      // tetap membaca tombol/teks di layar belakang meski sudah tertutup
      // secara visual. Atribut "inert" mencegah elemen tersebut difokus atau
      // diumumkan sama sekali; aria-hidden dipakai sebagai cadangan untuk
      // browser yang belum mendukung "inert". Beberapa popup tidak akan
      // pernah tumpang tindih, tapi penghitung ini tetap aman jika suatu
      // saat itu terjadi.
      var appContent = document.getElementById('appContent');
      var openPopupCount = 0;
      function lockBackgroundFromScreenReader(){
        openPopupCount += 1;
        if (!appContent) return;
        appContent.setAttribute('inert', '');
        appContent.setAttribute('aria-hidden', 'true');
      }
      function unlockBackgroundFromScreenReader(){
        openPopupCount = Math.max(0, openPopupCount - 1);
        if (openPopupCount > 0) return;
        if (!appContent) return;
        appContent.removeAttribute('inert');
        appContent.removeAttribute('aria-hidden');
      }

      // Menyimpan status piala (tingkat & bintang) ke IndexedDB, dengan
      // localStorage sebagai cache baca cepat yang tetap disamakan setiap kali.
      function saveTrophyState(state){
        window.tebakLaguSaveValue('tebakLagu_trophyTier', state.tier);
        window.tebakLaguSaveValue('tebakLagu_trophyStars', state.stars);
      }

      // Menambahkan bintang ke status piala saat ini. Jika bintang mencapai
      // target tingkat piala, naik ke piala berikutnya dan bintang kembali
      // ke 0. Piala Legend (tingkat terakhir) tidak memiliki batas atas.
      // TODO: panggil fungsi ini dari layar permainan mode Turnamen saat sudah dibuat.
      function addTrophyStars(amount){
        var state = window.tebakLaguLoadTrophyState();
        state.stars += amount;
        var isMaxTier = state.tier === TROPHY_TIERS.length - 1;
        if (!isMaxTier && state.stars >= TROPHY_TIERS[state.tier].target){
          state.tier += 1;
          state.stars = 0;
        }
        saveTrophyState(state);
        window.tebakLaguRenderTrophyBadge(state);
        return state;
      }
      window.tebakLaguAddTrophyStars = addTrophyStars;

      // Membangun daftar semua tingkatan piala di dalam modal, menandai
      // tingkat yang sudah tercapai, tingkat saat ini, dan yang masih terkunci.
      function renderTrophyTierList(){
        var state = window.tebakLaguLoadTrophyState();
        trophyTierList.innerHTML = '';
        TROPHY_TIERS.forEach(function(tierInfo, index){
          var li = document.createElement('li');
          li.className = 'trophy-tier-item';
          var status;
          if (index === state.tier){
            li.className += ' is-current';
            status = index === TROPHY_TIERS.length - 1
              ? ('Tingkat saat ini. ' + state.stars + ' bintang.')
              : ('Tingkat saat ini. ' + state.stars + ' dari ' + tierInfo.target + ' bintang.');
          } else if (index < state.tier){
            status = 'Sudah tercapai.';
          } else {
            li.className += ' is-locked';
            status = 'Belum tercapai.';
          }

          var targetLabel = index === TROPHY_TIERS.length - 1
            ? ('sampai ' + tierInfo.target + '+ bintang')
            : ('sampai ' + tierInfo.target + ' bintang');

          li.setAttribute('role', 'text');
          li.setAttribute('aria-label', 'Tingkat ' + (index + 1) + '. ' + tierInfo.name + ', ' + targetLabel + '. ' + status);

          var iconSpan = document.createElement('span');
          iconSpan.className = 'trophy-tier-icon';
          iconSpan.setAttribute('aria-hidden', 'true');
          iconSpan.textContent = tierInfo.icon;

          var bodyDiv = document.createElement('span');
          bodyDiv.className = 'trophy-tier-body';
          bodyDiv.setAttribute('aria-hidden', 'true');

          var nameSpan = document.createElement('span');
          nameSpan.className = 'trophy-tier-name';
          nameSpan.textContent = 'Tingkat ' + (index + 1) + ' — ' + tierInfo.name;

          var targetSpan = document.createElement('span');
          targetSpan.className = 'trophy-tier-target';
          targetSpan.textContent = targetLabel.charAt(0).toUpperCase() + targetLabel.slice(1) + ' ★';

          bodyDiv.appendChild(nameSpan);
          bodyDiv.appendChild(targetSpan);
          li.appendChild(iconSpan);
          li.appendChild(bodyDiv);
          trophyTierList.appendChild(li);
        });
      }

      // Menangani tombol Escape untuk menutup modal daftar piala.
      function handleTrophyModalKeydown(e){
        if (e.key === 'Escape'){
          closeTrophyModal();
        }
      }

      // Membuka modal daftar tingkatan piala dan memindahkan fokus ke judulnya
      // agar TalkBack/VoiceOver langsung mengumumkan modal baru.
      function openTrophyModal(){
        renderTrophyTierList();
        trophyOverlay.hidden = false;
        lockBackgroundFromScreenReader();
        trophyModalTitle.focus();
        document.addEventListener('keydown', handleTrophyModalKeydown);
      }

      // Menutup modal daftar tingkatan piala dan mengembalikan fokus ke badge.
      function closeTrophyModal(){
        trophyOverlay.hidden = true;
        unlockBackgroundFromScreenReader();
        document.removeEventListener('keydown', handleTrophyModalKeydown);
        trophyBadge.focus();
      }

      trophyBadge.addEventListener('click', openTrophyModal);
      btnTrophyClose.addEventListener('click', closeTrophyModal);
      trophyOverlay.addEventListener('click', function(e){
        if (e.target === trophyOverlay) closeTrophyModal();
      });

      var TOURNAMENT_QUESTIONS = window.TEBAK_LAGU_TOURNAMENT_QUESTIONS || {};
      var ROUND_SIZE = 5;
      // Jumlah soal per ronde untuk tingkat piala tertentu (indeks tingkat -> jumlah
      // soal). Tingkat yang tidak terdaftar di sini memakai ROUND_SIZE default.
      var ROUND_SIZE_BY_TIER = { 1: 10, 2: 15, 3: 15, 4: 20, 5: 25, 6: 25, 7: 30 }; // Piala Perak: 10 dari 15 soal, Piala Emas: 15 dari 25 soal, Piala Diamond: 15 dari 30 soal, Piala Elite: 20 dari 50 soal, Piala Master: 25 dari 40 soal, Piala Grandmaster: 25 dari 40 soal, Piala Legend: 30 dari seluruh bank soal (soal baru + arsip Perunggu-Grandmaster)
      // Indeks tingkat piala mulai dari mana tombol jawaban ke-3 ditampilkan.
      // Piala Diamond berada di indeks 3 (0:Perunggu, 1:Perak, 2:Emas, 3:Diamond, ...).
      // Semua tingkat sebelum Diamond (Perunggu, Perak, Emas) memakai 2 pilihan jawaban.
      var THIRD_ANSWER_START_TIER = 3; // Piala Diamond dan setelahnya: 3 pilihan jawaban
      // Piala Master berada di indeks 5 (0:Perunggu ... 4:Elite, 5:Master, ...).
      var FOURTH_ANSWER_START_TIER = 5; // Piala Master dan setelahnya: 4 pilihan jawaban
      var round = null; // { tier, pool, questions, index, score }

      // Menentukan jumlah soal yang ditampilkan dalam satu ronde untuk tingkat
      // piala tertentu, memakai ROUND_SIZE_BY_TIER jika ada, atau ROUND_SIZE default.
      function getRoundSizeForTier(tier){
        return ROUND_SIZE_BY_TIER.hasOwnProperty(tier) ? ROUND_SIZE_BY_TIER[tier] : ROUND_SIZE;
      }

      // Menentukan jumlah pilihan jawaban yang ditampilkan untuk tingkat piala
      // tertentu: 4 pilihan mulai dari Piala Master (FOURTH_ANSWER_START_TIER),
      // 3 pilihan mulai dari Piala Diamond (THIRD_ANSWER_START_TIER), dan
      // 2 pilihan untuk tingkat di bawahnya.
      function getAnswerCountForTier(tier){
        if (tier >= FOURTH_ANSWER_START_TIER) return 4;
        if (tier >= THIRD_ANSWER_START_TIER) return 3;
        return 2;
      }

      // Mengacak urutan array dengan algoritma Fisher-Yates tanpa mengubah
      // array aslinya.
      function shuffleArray(source){
        var arr = source.slice();
        for (var i = arr.length - 1; i > 0; i--){
          var j = Math.floor(Math.random() * (i + 1));
          var temp = arr[i];
          arr[i] = arr[j];
          arr[j] = temp;
        }
        return arr;
      }

      // Menyusun pilihan jawaban untuk satu soal: jawaban benar dan sejumlah
      // (count - 1) jawaban pengecoh acak yang berbeda, lalu diacak urutan
      // tampilnya. Jumlah pilihan mengikuti parameter count (default 2).
      function buildAnswerOptions(question, pool, count){
        var optionCount = count || 2;
        var uniqueTitles = [];
        pool.forEach(function(q){
          if (uniqueTitles.indexOf(q.answer) === -1) uniqueTitles.push(q.answer);
        });
        var others = shuffleArray(uniqueTitles.filter(function(t){ return t !== question.answer; }));
        var distractors = others.slice(0, optionCount - 1);
        // Jaga-jaga jika jumlah judul unik di pool lebih sedikit dari yang
        // dibutuhkan: isi kekurangan dengan pengulangan acak dari yang ada.
        while (distractors.length < optionCount - 1 && others.length){
          distractors.push(others[Math.floor(Math.random() * others.length)]);
        }
        return shuffleArray([question.answer].concat(distractors));
      }

      // Menampilkan layar permainan Turnamen.
      function showGameScreen(){
        screenMode.hidden = true;
        screenGame.hidden = false;
      }

      // Memulai satu ronde baru untuk tingkat piala saat ini: memilih 5 soal
      // acak dari kumpulan soal tingkat tersebut, lalu menampilkan soal pertama.
      // Jika tingkat piala saat ini belum memiliki soal, tampilkan pesan.
      function startTournamentRound(){
        var state = window.tebakLaguLoadTrophyState();
        var tierInfo = TROPHY_TIERS[state.tier];
        var pool = TOURNAMENT_QUESTIONS[state.tier];
        gameHeading.textContent = tierInfo.name;
        showGameScreen();

        if (!pool || pool.length === 0){
          clueCard.hidden = true;
          answerList.hidden = true;
          gameProgress.hidden = true;
          gameEmpty.hidden = false;
          gameHeading.focus();
          return;
        }

        clueCard.hidden = false;
        answerList.hidden = false;
        gameProgress.hidden = false;
        gameEmpty.hidden = true;

        var roundSize = getRoundSizeForTier(state.tier);
        var chosen = shuffleArray(pool).slice(0, Math.min(roundSize, pool.length));
        round = { tier: state.tier, pool: pool, questions: chosen, index: 0, score: 0 };
        renderCurrentQuestion();
      }

      // Menampilkan soal aktif di dalam ronde: teks petunjuk, progres, dan
      // dua tombol pilihan jawaban dalam urutan acak. Fokus dipindah ke kartu
      // petunjuk agar TalkBack/VoiceOver langsung mengumumkan soal baru.
      function renderCurrentQuestion(){
        var question = round.questions[round.index];
        var answerCount = getAnswerCountForTier(round.tier);
        var options = buildAnswerOptions(question, round.pool, answerCount);

        var progressLabel = 'Soal ' + (round.index + 1) + ' dari ' + round.questions.length;
        gameProgress.textContent = progressLabel;
        gameProgress.setAttribute('aria-label', progressLabel);
        setAccessibleText(clueText, question.clue);

        ANSWER_BTNS.forEach(function(btn, i){
          if (i < answerCount){
            btn.hidden = false;
            btn.textContent = options[i];
            btn.dataset.answer = options[i];
            btn.disabled = false;
            btn.classList.remove('is-correct', 'is-wrong');
          } else {
            btn.hidden = true;
          }
        });

        clueCard.focus();
      }

      // Menangani klik pada salah satu tombol jawaban: mengecek benar/salah,
      // menandai tombol secara visual, lalu membuka popup konfirmasi berisi
      // hasil jawaban dan tombol "Next" untuk melanjutkan.
      function handleAnswerClick(e){
        var chosenBtn = e.currentTarget;
        var question = round.questions[round.index];
        var chosenText = chosenBtn.dataset.answer;
        var isCorrect = chosenText === question.answer;

        ANSWER_BTNS.forEach(function(btn){
          if (btn.hidden) return;
          btn.disabled = true;
          if (btn.dataset.answer === question.answer){
            btn.classList.add('is-correct');
          } else if (btn === chosenBtn){
            btn.classList.add('is-wrong');
          }
        });

        if (isCorrect) round.score += 1;

        setAccessibleText(
          answerResultTitle,
          isCorrect ? 'Benar! ✅' : 'Kurang Tepat ❌',
          isCorrect ? 'Benar!' : 'Kurang Tepat'
        );
        setAccessibleText(
          answerResultDesc,
          isCorrect
            ? ('Jawaban benar adalah "' + question.answer + '".')
            : ('Jawaban kamu "' + chosenText + '" kurang tepat. Jawaban benar adalah "' + question.answer + '".')
        );
        answerOverlay.hidden = false;
        lockBackgroundFromScreenReader();
        answerResultTitle.focus();
      }
      answerBtn0.addEventListener('click', handleAnswerClick);
      answerBtn1.addEventListener('click', handleAnswerClick);
      answerBtn2.addEventListener('click', handleAnswerClick);
      answerBtn3.addEventListener('click', handleAnswerClick);

      // Melanjutkan ke soal berikutnya, atau menampilkan ringkasan ronde jika
      // soal terakhir sudah dijawab.
      function goToNextQuestion(){
        answerOverlay.hidden = true;
        unlockBackgroundFromScreenReader();
        round.index += 1;
        if (round.index < round.questions.length){
          renderCurrentQuestion();
        } else {
          finishRound();
        }
      }
      btnAnswerNext.addEventListener('click', goToNextQuestion);

      // Menyelesaikan ronde: menambahkan bintang piala sesuai jumlah jawaban
      // benar, lalu menampilkan ringkasan skor dengan fokus pada judulnya.
      function finishRound(){
        var earnedStars = round.score;
        if (earnedStars > 0) window.tebakLaguAddTrophyStars(earnedStars);

        setAccessibleText(
          summaryDesc,
          'Skor kamu ' + round.score + ' dari ' + round.questions.length +
            ' soal benar.' + (earnedStars > 0 ? ' Kamu mendapat ' + earnedStars + ' ★.' : ''),
          'Skor kamu ' + round.score + ' dari ' + round.questions.length +
            ' soal benar.' + (earnedStars > 0 ? ' Kamu mendapat ' + earnedStars + ' bintang.' : '')
        );
        summaryOverlay.hidden = false;
        lockBackgroundFromScreenReader();
        summaryTitle.focus();
      }

      btnSummaryAgain.addEventListener('click', function(){
        summaryOverlay.hidden = true;
        unlockBackgroundFromScreenReader();
        startTournamentRound();
      });

      btnSummaryDone.addEventListener('click', function(){
        summaryOverlay.hidden = true;
        unlockBackgroundFromScreenReader();
        screenGame.hidden = true;
        showModeScreen();
      });

      btnGameBack.addEventListener('click', function(){
        screenGame.hidden = true;
        showModeScreen();
      });

      // Menampilkan layar pilihan mode dan memindahkan fokus ke judulnya
      // agar TalkBack/VoiceOver langsung mengumumkan layar baru.
      function showModeScreen(){
        screenMenu.hidden = true;
        screenMode.hidden = false;
        modeHeading.focus();
      }

      // Kembali ke menu utama dan memindahkan fokus ke tombol Main.
      function showMenuScreen(){
        screenMode.hidden = true;
        screenMenu.hidden = false;
        btnMain.focus();
      }

      btnMain.addEventListener('click', showModeScreen);
      btnModeBack.addEventListener('click', showMenuScreen);

      // TODO: hubungkan ke layar permainan mode Clasic saat sudah dibuat
      btnModeClasic.addEventListener('click', function(){
        console.log('Mode Clasic dipilih - layar permainan belum dibuat');
      });

      btnModeTurnamen.addEventListener('click', function(){
        startTournamentRound();
      });

      // TODO: hubungkan ke layar pengaturan saat sudah dibuat
      btnSettings.addEventListener('click', function(){
        console.log('Pengaturan ditekan - layar pengaturan belum dibuat');
      });

      // TODO: hubungkan ke layar toko saat sudah dibuat
      btnToko.addEventListener('click', function(){
        console.log('Toko ditekan - layar toko belum dibuat');
      });

      // TODO: hubungkan ke layar koleksi saat sudah dibuat
      btnKoleksi.addEventListener('click', function(){
        console.log('Koleksi ditekan - layar koleksi belum dibuat');
      });

      // TODO: hubungkan ke layar statistik saat sudah dibuat
      btnStatistik.addEventListener('click', function(){
        console.log('Statistik ditekan - layar statistik belum dibuat');
      });

      // TODO: hubungkan ke layar panduan saat sudah dibuat
      btnPanduan.addEventListener('click', function(){
        console.log('Panduan ditekan - layar panduan belum dibuat');
      });
    })();
  </script>
